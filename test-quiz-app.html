<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI技術クイズアプリ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .quiz-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        .quiz-header {
            margin-bottom: 30px;
        }
        
        .quiz-title {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .quiz-subtitle {
            color: #666;
            font-size: 1.1em;
        }
        
        .question-container {
            margin-bottom: 30px;
            text-align: left;
        }
        
        .question-number {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .question-text {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        
        .options {
            display: grid;
            gap: 15px;
        }
        
        .option {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1em;
        }
        
        .option:hover {
            background: #e3f2fd;
            border-color: #667eea;
            transform: translateY(-2px);
        }
        
        .option.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .option.correct {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }
        
        .option.incorrect {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }
        
        .quiz-controls {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        .btn:hover {
            background: #5a6fd8;
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.5s ease;
        }
        
        .score-display {
            font-size: 1.2em;
            color: #667eea;
            font-weight: 600;
        }
        
        .results {
            text-align: center;
        }
        
        .final-score {
            font-size: 3em;
            color: #667eea;
            font-weight: 700;
            margin: 20px 0;
        }
        
        .result-message {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="quiz-header">
            <h1 class="quiz-title">🤖 AI技術クイズ</h1>
            <p class="quiz-subtitle">最新のAI技術に関する知識をテストしよう！</p>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div id="quizContent">
            <div class="question-container">
                <div class="question-number" id="questionNumber">質問 1 / 5</div>
                <div class="question-text" id="questionText">読み込み中...</div>
                <div class="options" id="optionsContainer">
                    <!-- オプションがここに動的に追加されます -->
                </div>
            </div>
            
            <div class="quiz-controls">
                <div class="score-display" id="scoreDisplay">スコア: 0 / 0</div>
                <button class="btn" id="nextBtn" onclick="nextQuestion()" disabled>次の質問</button>
            </div>
        </div>
        
        <div id="resultsContent" style="display: none;">
            <div class="results">
                <h2>🎉 クイズ完了！</h2>
                <div class="final-score" id="finalScore">0 / 5</div>
                <div class="result-message" id="resultMessage">お疲れ様でした！</div>
                <button class="btn" onclick="restartQuiz()">もう一度挑戦</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            {
                question: "機械学習の手法の中で、教師なし学習に分類されるのはどれですか？",
                options: ["線形回帰", "決定木", "クラスタリング", "サポートベクターマシン"],
                correct: 2
            },
            {
                question: "深層学習（ディープラーニング）で使用される基本的な構成要素は何ですか？",
                options: ["ニューラルネットワーク", "決定木", "線形回帰", "k-means法"],
                correct: 0
            },
            {
                question: "自然言語処理（NLP）で、文章の意味を理解するために使用される技術はどれですか？",
                options: ["画像認識", "音声認識", "トークン化", "データマイニング"],
                correct: 2
            },
            {
                question: "ChatGPTやGPT-4などの大規模言語モデルの基盤となっている技術は何ですか？",
                options: ["CNN", "RNN", "Transformer", "SVM"],
                correct: 2
            },
            {
                question: "コンピュータビジョンで物体検出を行う際によく使用されるアルゴリズムはどれですか？",
                options: ["YOLO", "BERT", "GPT", "LSTM"],
                correct: 0
            }
        ];
        
        let currentQuestion = 0;
        let score = 0;
        let selectedOption = -1;
        let answered = false;
        
        function loadQuestion() {
            const question = quizData[currentQuestion];
            document.getElementById('questionNumber').textContent = `質問 ${currentQuestion + 1} / ${quizData.length}`;
            document.getElementById('questionText').textContent = question.question;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const optionElement = document.createElement('div');
                optionElement.className = 'option';
                optionElement.textContent = option;
                optionElement.onclick = () => selectOption(index);
                optionsContainer.appendChild(optionElement);
            });
            
            updateProgress();
            updateScore();
            
            selectedOption = -1;
            answered = false;
            document.getElementById('nextBtn').disabled = true;
        }
        
        function selectOption(index) {
            if (answered) return;
            
            selectedOption = index;
            const options = document.querySelectorAll('.option');
            
            options.forEach((option, i) => {
                option.classList.remove('selected', 'correct', 'incorrect');
                if (i === index) {
                    option.classList.add('selected');
                }
            });
            
            document.getElementById('nextBtn').disabled = false;
        }
        
        function nextQuestion() {
            if (!answered) {
                // 回答を確認
                const options = document.querySelectorAll('.option');
                const correctIndex = quizData[currentQuestion].correct;
                
                options.forEach((option, i) => {
                    if (i === correctIndex) {
                        option.classList.add('correct');
                    } else if (i === selectedOption) {
                        option.classList.add('incorrect');
                    }
                });
                
                if (selectedOption === correctIndex) {
                    score++;
                }
                
                answered = true;
                document.getElementById('nextBtn').textContent = currentQuestion === quizData.length - 1 ? '結果を見る' : '次の質問';
                updateScore();
                
                return;
            }
            
            currentQuestion++;
            
            if (currentQuestion >= quizData.length) {
                showResults();
            } else {
                loadQuestion();
                document.getElementById('nextBtn').textContent = '回答する';
            }
        }
        
        function updateProgress() {
            const progress = ((currentQuestion + 1) / quizData.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }
        
        function updateScore() {
            document.getElementById('scoreDisplay').textContent = `スコア: ${score} / ${currentQuestion + (answered ? 1 : 0)}`;
        }
        
        function showResults() {
            document.getElementById('quizContent').style.display = 'none';
            document.getElementById('resultsContent').style.display = 'block';
            
            const percentage = Math.round((score / quizData.length) * 100);
            document.getElementById('finalScore').textContent = `${score} / ${quizData.length}`;
            
            let message = '';
            if (percentage >= 80) {
                message = '素晴らしい！AI技術に関する深い知識をお持ちですね！🎉';
            } else if (percentage >= 60) {
                message = 'よくできました！AI技術の基礎はしっかり理解されています！👏';
            } else if (percentage >= 40) {
                message = 'もう少し！AI技術について学習を続けましょう！📚';
            } else {
                message = 'AI技術について学習する良い機会ですね！頑張りましょう！💪';
            }
            
            document.getElementById('resultMessage').textContent = message;
        }
        
        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            selectedOption = -1;
            answered = false;
            
            document.getElementById('quizContent').style.display = 'block';
            document.getElementById('resultsContent').style.display = 'none';
